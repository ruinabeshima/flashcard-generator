<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#f0f4f8" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Briefcase body -->
  <rect x="25" y="35" width="50" height="35" rx="3" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Briefcase handle -->
  <path d="M 35 35 Q 35 15, 50 15 Q 65 15, 65 35" fill="none" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Briefcase lock -->
  <rect x="48" y="48" width="4" height="6" fill="#1e40af" rx="1"/>
  
  <!-- Checkmark inside briefcase -->
  <g transform="translate(50, 55)">
    <path d="M -8 -2 L -2 4 L 8 -6" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Glow effect for the checkmark -->
  <circle cx="50" cy="55" r="12" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3"/>
</svg>