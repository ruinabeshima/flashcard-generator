name: CI Build and Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        working-directory: ./client
        run: pnpm install

      - name: Install backend dependencies
        working-directory: ./server
        run: pnpm install

      - name: Type-check frontend
        working-directory: ./client
        run: pnpm run typecheck

      - name: Type-check backend
        working-directory: ./server
        run: pnpm run typecheck

      - name: Run frontend linter
        working-directory: ./client
        run: pnpm run lint

      - name: Run backend linter
        working-directory: ./server
        run: pnpm run lint

      - name: Run frontend formatter
        working-directory: ./client
        run: pnpm run format

      - name: Run backend formatter
        working-directory: ./server
        run: pnpm run format

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install backend dependencies
        working-directory: ./server
        run: pnpm install

      - name: Test
        working-directory: ./server
        run: pnpm run test:coverage

  e2e:
    name: Frontend E2E Tests (Playwright)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      VITE_SERVER_URL: "http://localhost:3000"
      VITE_FIREBASE_API_KEY: "ci-fake-key"
      VITE_FIREBASE_AUTH_DOMAIN: "ci-fake-auth-domain"
      VITE_FIREBASE_PROJECT_ID: "ci-fake-project"
      VITE_FIREBASE_APP_ID: "ci-fake-app-id"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        working-directory: ./client
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser + deps
        working-directory: ./client
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ./client
        run: pnpm run test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

  build:
    name: Build
    needs: [test, e2e]
    runs-on: ubuntu-latest

    env:
      CLIENT_URL: ${{ secrets.CLIENT_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      R2_ACCOUNT_ID: ${{secrets.R2_ACCOUNT_ID}}
      R2_ACCESS_KEY_ID: ${{secrets.R2_ACCESS_KEY_ID}}
      R2_BUCKET_NAME: ${{secrets.R2_BUCKET_NAME}}
      R2_SECRET_ACCESS_KEY: ${{secrets.R2_SECRET_ACCESS_KEY}}
      VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install backend dependencies
        working-directory: ./server
        run: pnpm install

      - name: Run Prisma migrations
        working-directory: ./server
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Authenticate Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{vars.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        working-directory: ./client
        run: |
          docker build \
            --build-arg VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }} \
            --build-arg VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }} \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }} \
            --build-arg VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --build-arg VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }} \
            -t ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/applywise-repo/apply-wise:${{ github.sha }} .
          docker push ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/applywise-repo/apply-wise:${{ github.sha }}

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        uses: "google-github-actions/deploy-cloudrun@v2"
        with:
          service: apply-wise
          region: ${{ vars.GCP_REGION }}
          image: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/applywise-repo/apply-wise:${{ github.sha }}
          flags: "--allow-unauthenticated"
          env_vars: |
            VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }} 
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }} 
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }} 
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }} 
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
